# .github/workflows/deploy.yml
#
# Two jobs:
#   1. pages  – builds the demo site and deploys it to GitHub Pages
#   2. npm    – publishes the library to npm (only on version-tag pushes)
#
# Required repository secrets:
#   NPM_TOKEN  – your npm access token (only needed for the npm job)
#
# Required GitHub settings:
#   Settings → Pages → Source: GitHub Actions

name: Deploy

on:
  push:
    branches: [main]
#    tags:     ['v*']      # v1.0.0, v1.2.3, …
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages:    write
  id-token: write

jobs:

  # ── 1. Build and deploy GitHub Pages demo site ─────────────────────────────
  pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build the library dist files
      - name: Build library
        run: node build.mjs

      # Download sql.js into docs/libs/sqljs/
      # We download at CI time so binary files are NOT committed to git.
      - name: Download sql.js
        run: |
          mkdir -p docs/libs/sqljs
          BASE="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3"
          curl -sSfL "$BASE/sql-wasm.js"   -o docs/libs/sqljs/sql-wasm.js
          curl -sSfL "$BASE/sql-wasm.wasm" -o docs/libs/sqljs/sql-wasm.wasm
          echo "sql-wasm.js  $(wc -c < docs/libs/sqljs/sql-wasm.js) bytes"
          echo "sql-wasm.wasm $(wc -c < docs/libs/sqljs/sql-wasm.wasm) bytes"

      # Copy the built library into the demo so it works standalone
      - name: Copy library into demo site
        run: |
          cp dist/stratum-sqlite.umd.js docs/libs/sqljs/stratum-sqlite.umd.js
          cp dist/stratum-sqlite.esm.js docs/libs/sqljs/stratum-sqlite.esm.js

      # Prevent Jekyll from mangling the site (the .wasm mime type breaks with Jekyll)
      - name: Add .nojekyll
        run: touch docs/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4


  # ── 2. Publish library to npm (only on vX.Y.Z tags) ────────────────────────
  npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build library
        run: node build.mjs

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
