name: Deploy site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages:    write
  id-token: write

jobs:
  pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Build library
        run: node build.mjs

      - name: Download sql.js          # stratum-sqlite only — replace with DuckDB steps for stratum-duckdb
        run: |
          mkdir -p docs/libs/sqljs
          BASE="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3"
          curl -sSfL "$BASE/sql-wasm.js"   -o docs/libs/sqljs/sql-wasm.js
          curl -sSfL "$BASE/sql-wasm.wasm" -o docs/libs/sqljs/sql-wasm.wasm

      - name: Copy library into demo site
        run: |
          cp dist/stratum-sqlite.umd.js docs/libs/sqljs/stratum-sqlite.umd.js
          cp dist/stratum-sqlite.esm.js docs/libs/sqljs/stratum-sqlite.esm.js

      - name: Add .nojekyll
        run: touch docs/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4